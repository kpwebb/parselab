# Parselab — Electronics Datasheet Corpus Manifest
#
# 12 vendor datasheets across passives, discretes, power converters,
# MCUs, USB-PD, and connectors. Used to evaluate VLMs on electronic-
# component documents specifically. Each entry names the PDF and the
# extraction targets that page-shape exercises (parameter tables,
# thermal characteristics, package drawings, pinouts, etc.).
#
# Add your own PDFs in this directory and extend this manifest to
# point the harness at a different workload.

# ──── Passives ────

[yageo_rc0805]
file = "yageo_rc0805.pdf"
class = "passive/resistor"
vendor = "Yageo"
part_number = "RC0805"
pages = 10
targets = ["electrical", "thermal", "package"]

